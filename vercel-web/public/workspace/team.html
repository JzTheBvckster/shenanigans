<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Team — Shenanigans</title>
    <link rel="stylesheet" href="/assets/styles.css">
</head>

<body>
    <div class="app-shell" id="appShell">
        <header class="app-header" id="appHeader"></header>
        <aside class="app-sidebar" id="appSidebar"></aside>

        <main class="app-content" id="appContent">
            <section class="page-view" id="pageEmpTeam">
                <div class="page-header">
                    <h2>My Team</h2>
                    <p>Team members in your department</p>
                </div>
                <div class="stats-row" id="empTeamStats"></div>
                <div class="card">
                    <div class="card-header">
                        <h3>Team Members</h3>
                    </div>
                    <div id="empTeamList">
                        <div class="loading-spinner visible"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="/assets/shared.js?v=6"></script>
    <script src="/assets/employee.js?v=6"></script>
    <script>
        ShenanigansApp.init({
            sidebar: 'employee',
            activePage: 'empTeam',
            subtitle: 'Employee Workspace',
            onReady: function () { loadEmpTeam(); }
        });
    </script>
</body>

</html>
