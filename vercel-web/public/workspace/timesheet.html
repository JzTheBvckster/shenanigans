<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Sheet — Shenanigans</title>
    <link rel="stylesheet" href="/assets/styles.css">
</head>

<body>
    <div class="app-shell" id="appShell">
        <header class="app-header" id="appHeader"></header>
        <aside class="app-sidebar" id="appSidebar"></aside>

        <main class="app-content" id="appContent">
            <section class="page-view" id="pageEmpTimesheet">
                <div class="page-header">
                    <h2>Time Sheet</h2>
                    <p>Track your hours across assigned projects</p>
                </div>
                <div class="stats-row" id="empTimesheetStats"></div>

                <!-- Add Time Entry Form -->
                <div class="card" id="empTimeForm" style="display:none;margin-bottom:20px">
                    <div class="card-header">
                        <h3>Log Time Entry</h3>
                    </div>
                    <form id="empTimeEntryForm" style="display:flex;flex-wrap:wrap;gap:12px;padding:4px 0">
                        <select id="tsProject" required style="flex:1;min-width:160px" class="form-input">
                            <option value="">Select project…</option>
                        </select>
                        <input id="tsDate" type="date" required class="form-input" style="width:150px">
                        <input id="tsHours" type="number" min="0.25" max="24" step="0.25" placeholder="Hours" required
                            class="form-input" style="width:100px">
                        <input id="tsDesc" type="text" placeholder="Description (optional)" class="form-input"
                            style="flex:2;min-width:160px">
                        <button type="submit" class="btn btn-primary">Save</button>
                        <button type="button" class="btn btn-outline"
                            onclick="document.getElementById('empTimeForm').style.display='none'">Cancel</button>
                    </form>
                    <div id="empTimeFormNotice"></div>
                </div>

                <div class="content-grid">
                    <div class="card">
                        <div class="card-header">
                            <h3>Time Entries</h3>
                            <button class="btn btn-sm btn-primary"
                                onclick="document.getElementById('empTimeForm').style.display='block'">+ Log
                                Hours</button>
                        </div>
                        <div id="empTimeEntries">
                            <div class="loading-spinner visible"></div>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-header">
                            <h3>Weekly Summary</h3>
                        </div>
                        <div id="empWeeklySummary"></div>
                        <div class="card-header" style="margin-top:16px">
                            <h3>Reminders</h3>
                        </div>
                        <div id="empTimeReminders"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="/assets/shared.js?v=6"></script>
    <script src="/assets/employee.js?v=6"></script>
    <script>
        ShenanigansApp.init({
            sidebar: 'employee',
            activePage: 'empTimesheet',
            subtitle: 'Employee Workspace',
            onReady: function () { loadEmpTimesheet(); }
        });
    </script>
</body>

</html>
