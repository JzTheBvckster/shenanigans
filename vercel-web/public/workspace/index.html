<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tasks — Shenanigans</title>
    <link rel="stylesheet" href="/assets/styles.css">
</head>

<body>
    <div class="app-shell" id="appShell">
        <header class="app-header" id="appHeader"></header>
        <aside class="app-sidebar" id="appSidebar"></aside>

        <main class="app-content" id="appContent">
            <section class="page-view" id="pageEmpTasks">
                <div class="page-header">
                    <h2>My Tasks</h2>
                    <p>Track your active and upcoming work items</p>
                </div>
                <div class="stats-row" id="empTasksStats"></div>
                <div class="card">
                    <div class="card-header">
                        <h3>Task List</h3>
                    </div>
                    <div id="empTasksList">
                        <div class="loading-spinner visible"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Task Detail Modal (Employee) -->
    <div class="modal-overlay hidden" id="empTaskModal">
        <div class="modal-card">
            <div class="modal-header">
                <h3 id="empTaskModalTitle">Task Details</h3>
                <button class="modal-close" onclick="closeModal('empTaskModal')">&times;</button>
            </div>
            <div class="modal-body">
                <div id="empTaskDetail"></div>
                <!-- Task Comments -->
                <div class="task-comments-section" id="empTaskCommentsSection">
                    <label>Comments</label>
                    <div class="task-comments-list" id="empTaskCommentsList"></div>
                    <div class="task-comment-input">
                        <textarea id="empTaskCommentText" rows="2" placeholder="Add a comment..." maxlength="2000"></textarea>
                        <button class="btn-comment-send" onclick="postEmpTaskComment()">Send</button>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-modal-cancel" onclick="closeModal('empTaskModal')">Close</button>
            </div>
        </div>
    </div>

    <script src="/assets/shared.js?v=6"></script>
    <script src="/assets/employee.js?v=6"></script>
    <script>
        ShenanigansApp.init({
            sidebar: 'employee',
            activePage: 'empTasks',
            subtitle: 'Employee Workspace',
            onReady: function () { loadEmpTasks(); }
        });
    </script>
</body>

</html>
