<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Documents</title>
    <link rel="stylesheet" href="/assets/styles.css?v=20" />
  </head>

  <body>
    <div class="app-shell" id="appShell">
      <header class="app-header" id="appHeader"></header>
      <aside class="app-sidebar" id="appSidebar"></aside>

      <main class="app-content" id="appContent">
        <section class="page-view" id="pagePmDocuments">
          <div class="page-header">
            <h2>Documents</h2>
            <p>Project and company documents for your teams</p>
          </div>
          <div class="stats-row" id="pmDocsStats"></div>
          <div class="content-grid">
            <div class="card">
              <div class="card-header">
                <h3>Company Documents</h3>
              </div>
              <div id="pmCompanyDocs"></div>
            </div>
            <div class="card">
              <div class="card-header">
                <h3>Project Documents</h3>
              </div>
              <div id="pmProjectDocs"></div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="/assets/shared.js?v=15"></script>
    <script src="/assets/pm.js?v=10"></script>
    <script>
      ShenanigansApp.init({
        sidebar: "pm",
        activePage: "pmDocuments",
        subtitle: "PM Workspace",
        onReady: function () {
          loadPMDocuments();
        },
      });
    </script>
  </body>
</html>
