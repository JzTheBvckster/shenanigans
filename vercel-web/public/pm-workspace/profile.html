<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile — Shenanigans</title>
    <link rel="stylesheet" href="/assets/styles.css?v=14" />
  </head>

  <body>
    <div class="app-shell" id="appShell">
      <header class="app-header" id="appHeader"></header>
      <aside class="app-sidebar" id="appSidebar"></aside>

      <main class="app-content" id="appContent">
        <section class="page-view" id="pagePmProfile">
          <div class="page-header">
            <h2>My Profile</h2>
            <p>Your project manager profile overview</p>
          </div>
          <div class="stats-row" id="pmProfileStats"></div>
          <div class="card">
            <div id="pmProfileContent">
              <div class="loading-spinner visible"></div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="/assets/shared.js?v=11"></script>
    <script src="/assets/pm.js?v=10"></script>
    <script>
      ShenanigansApp.init({
        sidebar: "pm",
        activePage: "pmProfile",
        subtitle: "PM Workspace",
        onReady: function () {
          loadPMProfile();
        },
      });
    </script>
  </body>
</html>
