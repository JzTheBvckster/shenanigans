<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projects</title>
    <link rel="stylesheet" href="/assets/styles.css?v=20" />
  </head>

  <body>
    <div class="app-shell" id="appShell">
      <header class="app-header" id="appHeader"></header>
      <aside class="app-sidebar" id="appSidebar"></aside>

      <main class="app-content" id="appContent">
        <section class="page-view" id="pageProjects">
          <div class="page-header">
            <h2>Projects</h2>
            <p>Track project status and progress</p>
          </div>
          <div class="notice" id="projectsNotice"></div>

          <div
            class="page-filters"
            id="projectFilters"
            style="margin-bottom: 12px"
          >
            <div class="filter-item">
              <label for="projDeptFilter">Department</label>
              <select id="projDeptFilter">
                <option value="">All Departments</option>
              </select>
            </div>
            <div class="filter-item">
              <label for="projStatusFilter">Status</label>
              <select id="projStatusFilter">
                <option value="">All Statuses</option>
                <option value="PENDING_APPROVAL">Pending Approval</option>
                <option value="PLANNING">Planning</option>
                <option value="IN_PROGRESS">In Progress</option>
                <option value="COMPLETED">Completed</option>
                <option value="ON_HOLD">On Hold</option>
                <option value="CANCELLED">Cancelled</option>
              </select>
            </div>
            <div class="filter-item filter-item-wide">
              <label for="projSearchFilter">Search</label>
              <input
                type="text"
                id="projSearchFilter"
                placeholder="Search by project name, manager, or department..."
              />
            </div>
            <div class="filter-actions">
              <button
                class="btn-secondary btn-small"
                type="button"
                onclick="clearProjectFilters()"
              >
                Clear Filters
              </button>
            </div>
          </div>

          <div class="dept-stats-row" id="projectsDeptStats"></div>
          <div class="dept-groups" id="projectsDeptGroups">
            <div class="loading-spinner visible"></div>
          </div>

          <!-- Archived Projects -->
          <div class="archived-section">
            <button
              class="btn-toggle-archived"
              onclick="toggleArchivedProjects()"
            >
              <span id="archivedToggleText">Show Archived Projects</span>
              <span class="archived-count" id="archivedCount">0</span>
            </button>
            <div class="archived-list hidden" id="archivedProjectsList"></div>
          </div>
        </section>
      </main>
    </div>

    <!-- Project Modal -->
    <div class="modal-overlay hidden" id="projectModal">
      <div class="modal-card">
        <div class="modal-header">
          <h3 id="projectModalTitle">Add Project</h3>
          <button class="modal-close" onclick="closeModal('projectModal')">
            &times;
          </button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="projId" />
          <div class="modal-field">
            <label>Project Name *</label
            ><input type="text" id="projName" placeholder="Project Alpha" />
          </div>
          <div class="modal-field">
            <label>Description</label
            ><textarea
              id="projDescription"
              rows="3"
              placeholder="Project description..."
            ></textarea>
          </div>
          <div class="modal-field">
            <label>Department</label
            ><select id="projDepartment"></select>
          </div>
          <div class="modal-field">
            <label>Status</label>
            <select id="projStatus">
              <option value="PENDING_APPROVAL">Pending Approval</option>
              <option value="PLANNING">Planning</option>
              <option value="IN_PROGRESS">In Progress</option>
              <option value="COMPLETED">Completed</option>
              <option value="ARCHIVED">Archived</option>
              <option value="ON_HOLD">On Hold</option>
              <option value="CANCELLED">Cancelled</option>
            </select>
          </div>
          <div class="modal-field">
            <label>Priority</label>
            <select id="projPriority">
              <option value="LOW">Low</option>
              <option value="MEDIUM" selected>Medium</option>
              <option value="HIGH">High</option>
              <option value="CRITICAL">Critical</option>
            </select>
          </div>
          <div class="modal-row">
            <div class="modal-field">
              <label>Budget</label
              ><input
                type="number"
                id="projBudget"
                placeholder="100000"
                step="0.01"
              />
            </div>
            <div class="modal-field">
              <label>Spent</label
              ><input
                type="number"
                id="projSpent"
                placeholder="0"
                step="0.01"
              />
            </div>
          </div>
          <div class="modal-field">
            <label>Completion %</label
            ><input
              type="number"
              id="projCompletion"
              placeholder="0"
              min="0"
              max="100"
            />
          </div>
          <div class="modal-row">
            <div class="modal-field">
              <label>Start Date</label><input type="date" id="projStartDate" />
            </div>
            <div class="modal-field">
              <label>End Date</label><input type="date" id="projEndDate" />
            </div>
          </div>
          <div class="modal-notice" id="projModalNotice"></div>
        </div>
        <div class="modal-footer">
          <button
            class="btn-modal-delete hidden"
            id="projDeleteBtn"
            onclick="deleteProject()"
          >
            Delete
          </button>
          <button
            class="btn-modal-archive hidden"
            id="projArchiveBtn"
            onclick="archiveProject()"
          >
            Archive
          </button>
          <div class="modal-footer-spacer"></div>
          <button class="btn-modal-cancel" onclick="closeModal('projectModal')">
            Cancel
          </button>
          <button
            class="btn-modal-save"
            id="projSaveBtn"
            onclick="saveProject()"
          >
            Save
          </button>
        </div>
      </div>
    </div>

    <script src="/assets/shared.js?v=15"></script>
    <script src="/assets/admin.js?v=8"></script>
    <script>
      ShenanigansApp.init({
        sidebar: "admin",
        activePage: "projects",
        subtitle: "Project Management",
        showAddBtn: true,
        addBtnText: "+ Add Project",
        onReady: function () {
          initProjectFilters();
          loadProjects();
          setupSearchFilter(filterProjectCards);
          document
            .getElementById("headerAddBtn")
            .addEventListener("click", function () {
              openProjectModal(null);
            });
        },
      });
    </script>
  </body>
</html>
