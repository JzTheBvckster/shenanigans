<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance — Shenanigans</title>
    <link rel="stylesheet" href="/assets/styles.css">
</head>

<body>
    <div class="app-shell" id="appShell">
        <header class="app-header" id="appHeader"></header>
        <aside class="app-sidebar" id="appSidebar"></aside>

        <main class="app-content" id="appContent">
            <section class="page-view" id="pageFinance">
                <div class="page-header">
                    <h2>Invoices</h2>
                    <p>Financial overview and invoice management</p>
                    <div style="display:flex;gap:8px;margin-top:8px">
                        <button class="header-primary-btn" id="financeAddBtn" onclick="openInvoiceModal(null)">+ Add
                            Invoice</button>
                        <button class="header-export-btn" id="financeExportBtn" onclick="exportInvoicesCSV()">Export
                            CSV</button>
                    </div>
                </div>
                <div class="notice" id="financeNotice"></div>
                <div class="kanban-board" id="financeKanban">
                    <div class="kanban-column" id="colDue">
                        <div class="kanban-header kanban-header-due">
                            <span class="title">Due / Outstanding</span>
                            <span class="count" id="countDue">0</span>
                        </div>
                        <div class="kanban-cards" id="cardsDue">
                            <div class="loading-spinner visible"></div>
                        </div>
                    </div>
                    <div class="kanban-column" id="colPaid">
                        <div class="kanban-header kanban-header-paid">
                            <span class="title">Paid</span>
                            <span class="count" id="countPaid">0</span>
                        </div>
                        <div class="kanban-cards" id="cardsPaid">
                            <div class="loading-spinner visible"></div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Invoice Modal -->
    <div class="modal-overlay hidden" id="invoiceModal">
        <div class="modal-card">
            <div class="modal-header">
                <h3 id="invoiceModalTitle">Add Invoice</h3>
                <button class="modal-close" onclick="closeModal('invoiceModal')">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="invId">
                <div class="modal-field"><label>Client *</label><input type="text" id="invClient"
                        placeholder="Acme Corp"></div>
                <div class="modal-field"><label>Amount *</label><input type="number" id="invAmount" placeholder="5000"
                        step="0.01"></div>
                <div class="modal-field"><label>Paid</label>
                    <select id="invPaid">
                        <option value="false">Outstanding</option>
                        <option value="true">Paid</option>
                    </select>
                </div>
                <div class="modal-field"><label>Project ID (optional)</label><input type="text" id="invProjectId"
                        placeholder="project-id"></div>
                <div class="modal-notice" id="invModalNotice"></div>
            </div>
            <div class="modal-footer">
                <button class="btn-modal-delete hidden" id="invDeleteBtn" onclick="deleteInvoice()">Delete</button>
                <div class="modal-footer-spacer"></div>
                <button class="btn-modal-cancel" onclick="closeModal('invoiceModal')">Cancel</button>
                <button class="btn-modal-save" id="invSaveBtn" onclick="saveInvoice()">Save</button>
            </div>
        </div>
    </div>

    <script src="/assets/shared.js"></script>
    <script src="/assets/admin.js"></script>
    <script>
        ShenanigansApp.init({
            sidebar: 'admin',
            activePage: 'finance',
            subtitle: 'Financial Management',
            onReady: function () { loadFinance(); }
        });
    </script>
</body>

</html>
