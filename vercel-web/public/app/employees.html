<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employees — Shenanigans</title>
    <link rel="stylesheet" href="/assets/styles.css">
</head>

<body>
    <div class="app-shell" id="appShell">
        <header class="app-header" id="appHeader"></header>
        <aside class="app-sidebar" id="appSidebar"></aside>

        <main class="app-content" id="appContent">
            <section class="page-view" id="pageEmployees">
                <div class="page-header">
                    <h2>Employees</h2>
                    <p>Manage your team across departments</p>
                </div>
                <div class="notice" id="employeesNotice"></div>
                <div class="page-filters" id="employeeFilters" style="margin-bottom:12px;">
                    <div class="filter-item">
                        <label for="empDeptFilter">Department</label>
                        <select id="empDeptFilter">
                            <option value="">All Departments</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label for="empStatusFilter">Status</label>
                        <select id="empStatusFilter">
                            <option value="">All Statuses</option>
                            <option value="ACTIVE">Active</option>
                            <option value="ON_LEAVE">On Leave</option>
                            <option value="TERMINATED">Terminated</option>
                        </select>
                    </div>
                    <div class="filter-item filter-item-wide">
                        <label for="empNameFilter">Search</label>
                        <input type="text" id="empNameFilter" placeholder="Search by name, email, or position...">
                    </div>
                    <div class="filter-actions">
                        <button class="btn-secondary btn-small" type="button" onclick="clearEmployeeFilters()">Clear Filters</button>
                    </div>
                </div>
                <div class="dept-stats-row" id="employeesDeptStats"></div>
                <div class="dept-groups" id="employeesDeptGroups">
                    <div class="loading-spinner visible"></div>
                </div>
            </section>
        </main>
    </div>

    <!-- Employee Modal -->
    <div class="modal-overlay hidden" id="employeeModal">
        <div class="modal-card">
            <div class="modal-header">
                <h3 id="employeeModalTitle">Add Employee</h3>
                <button class="modal-close" onclick="closeModal('employeeModal')">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="empId">
                <div class="modal-field"><label>First Name *</label><input type="text" id="empFirstName"
                        placeholder="John"></div>
                <div class="modal-field"><label>Last Name</label><input type="text" id="empLastName" placeholder="Doe">
                </div>
                <div class="modal-field"><label>Email</label><input type="email" id="empEmail"
                        placeholder="john@company.com"></div>
                <div class="modal-field"><label>Phone</label><input type="text" id="empPhone"
                        placeholder="+1 234 567 890"></div>
                <div class="modal-field"><label>Department</label><select id="empDepartment"></select></div>
                <div class="modal-field"><label>Position</label><input type="text" id="empPosition"
                        placeholder="Software Engineer"></div>
                <div class="modal-field"><label>Status</label>
                    <select id="empStatus">
                        <option value="ACTIVE">Active</option>
                        <option value="ON_LEAVE">On Leave</option>
                        <option value="TERMINATED">Terminated</option>
                    </select>
                </div>
                <div class="modal-field"><label>Salary</label><input type="number" id="empSalary" placeholder="50000"
                        step="0.01"></div>
                <div class="modal-field"><label>Hire Date</label><input type="date" id="empHireDate"></div>
                <div class="modal-notice" id="empModalNotice"></div>
            </div>
            <div class="modal-footer">
                <button class="btn-modal-delete hidden" id="empDeleteBtn" onclick="deleteEmployee()">Delete</button>
                <div class="modal-footer-spacer"></div>
                <button class="btn-modal-cancel" onclick="closeModal('employeeModal')">Cancel</button>
                <button class="btn-modal-save" id="empSaveBtn" onclick="saveEmployee()">Save</button>
            </div>
        </div>
    </div>

    <script src="/assets/shared.js?v=6"></script>
    <script src="/assets/admin.js?v=6"></script>
    <script>
        ShenanigansApp.init({
            sidebar: 'admin',
            activePage: 'employees',
            subtitle: 'Employee Management',
            showSearch: true,
            searchPlaceholder: 'Search employees...',
            showAddBtn: true,
            addBtnText: '+ Add Employee',
            onReady: function () {
                initEmployeeFilters();
                loadEmployees();
                setupSearchFilter(filterEmployeeCards);
                document.getElementById('headerAddBtn').addEventListener('click', function () { openEmployeeModal(null); });
            }
        });
    </script>
</body>

</html>
